<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../login/login.css">
</head>

<body>

    <div class="wrapper">
        <form action="/register" method="post">
            <h1>Register</h1>

            <div class="input-box">
                <input type="text" name="user_id" placeholder="아이디" required>
            </div>

            <div class="input-box">
                <input type="password" name="user_pw" placeholder="비밀번호" required>
            </div>

            <div class="input-box">
                <input type="text" name="user_name" placeholder="이름" required>
            </div>

            <div class="input-box">
                <input type="email" name="email" placeholder="이메일">
            </div>

            <!-- ⭐ 여기서 메시지 뜸 -->
            <p id="error-message" class="error-message" style="display:none; color:red; font-size:14px; margin-top:10px;"></p>

            <button type="submit" class="btn">Sing up</button>

            <div class="login-link">
                <p>Already have an account?
                    <a href="../login/login.html">Login</a>
                </p>
            </div>
        </form>
    </div>

    <!-- URL의 에러코드를 읽고 메시지 출력 -->
    <script>
      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const errTag = document.getElementById('error-message');

      if (error === 'pw') {
        errTag.textContent = '비밀번호는 8글자 이상이고 특수문자를 최소 1개 포함해야 합니다.';
        errTag.style.display = 'block';
      } else if (error === '1') {
        errTag.textContent = '이미 존재하는 아이디거나 서버 오류가 발생했습니다.';
        errTag.style.display = 'block';
      } else if (error === 'server') {
        errTag.textContent = '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
        errTag.style.display = 'block';
      }
    </script>

</body>
</html>
